name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/logistics-platform

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: logistics_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev libgeos-dev libproj-dev

      - name: Install Python dependencies
        run: |
          cd $GITHUB_WORKSPACE/backend
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov python-dateutil

      - name: Run migrations and tests
        env:
          DJANGO_SETTINGS_MODULE: core.settings
          SECRET_KEY: ci-secret-key-at-least-50-characters-long-xyzabc123
          DB_NAME: logistics_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: "5432"
          REDIS_URL: redis://localhost:6379/0
          DEBUG: "True"
          GROQ_API_KEY: ""
          GROQ_MODEL: llama-3.3-70b-versatile
          AWS_ACCESS_KEY_ID: ""
          AWS_SECRET_ACCESS_KEY: ""
          AWS_STORAGE_BUCKET_NAME: ""
          AWS_S3_REGION_NAME: us-east-1
          DATADOG_API_KEY: ""
        run: |
          cd $GITHUB_WORKSPACE/backend
          python manage.py migrate --noinput
          pytest --tb=short -q

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci --prefer-offline

      - name: Build
        run: |
          cd frontend
          npm run build

      - name: Check bundle size
        run: |
          cd frontend
          MAX_KB=1500
          TOTAL=$(du -sk dist/assets/*.js 2>/dev/null | awk '{sum += $1} END {print sum}')
          echo "Total JS bundle: ${TOTAL}KB (limit: ${MAX_KB}KB)"
          if [ "$TOTAL" -gt "$MAX_KB" ]; then
            echo "Bundle too large: ${TOTAL}KB > ${MAX_KB}KB"
            exit 1
          fi

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, frontend-build]
    if: github.ref == 'refs/heads/main'

    outputs:
      api-tag: ${{ steps.meta-api.outputs.tags }}
      frontend-tag: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        id: meta-api
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:${{ github.sha }}

      - name: Build and push frontend image
        id: meta-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        env:
          DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST \
            "cd /opt/logistics && \
             export API_IMAGE_TAG=$IMAGE_TAG && \
             export FRONTEND_IMAGE_TAG=$IMAGE_TAG && \
             docker-compose pull api frontend && \
             docker-compose up -d api frontend worker_ais worker_invoices worker_voyages beat"

      - name: Wait for health check
        run: sleep 30

      - name: Staging health check
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
        run: |
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $STAGING_URL/api/health/)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying..."
            sleep 10
          done
          echo "Health check failed after 10 attempts"
          exit 1

  load-test:
    name: Performance Load Test
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.49.0/k6-v0.49.0-linux-amd64.tar.gz -L | tar xvz
          sudo mv k6-v0.49.0-linux-amd64/k6 /usr/local/bin/

      - name: Run k6 load test
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
        run: |
          k6 run scripts/k6_load_test.js \
            -e BASE_URL=$STAGING_URL \
            --out json=k6_results.json

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: k6_results.json

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: load-test
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        env:
          DEPLOY_HOST: ${{ secrets.PROD_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          IMAGE_TAG: ${{ github.sha }}
          PREV_TAG: ${{ github.event.before }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST \
            "cd /opt/logistics && \
             echo $PREV_TAG > .previous_tag && \
             export API_IMAGE_TAG=$IMAGE_TAG && \
             export FRONTEND_IMAGE_TAG=$IMAGE_TAG && \
             docker-compose pull api frontend && \
             docker-compose up -d --no-deps api frontend worker_ais worker_invoices worker_voyages beat"

      - name: Production smoke test + rollback guard
        env:
          PROD_URL: ${{ secrets.PROD_URL }}
          DEPLOY_HOST: ${{ secrets.PROD_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key && chmod 600 /tmp/deploy_key
          sleep 30
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $PROD_URL/api/health/)
            if [ "$STATUS" = "200" ]; then
              echo "Production deployment healthy"
              exit 0
            fi
            sleep 15
          done
          echo "Production health check failed — triggering rollback"
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST \
            "cd /opt/logistics && \
             PREV_TAG=\$(cat .previous_tag) && \
             export API_IMAGE_TAG=\$PREV_TAG && \
             export FRONTEND_IMAGE_TAG=\$PREV_TAG && \
             docker-compose up -d --no-deps api frontend && \
             echo 'Rollback to '\$PREV_TAG' completed'"
          exit 1
